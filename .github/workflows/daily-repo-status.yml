name: Daily Repo Status

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Repo Status Report
        uses: actions/github-script@v7
        id: report-gen
        with:
          script: |
            const now = new Date();
            const last24h = new Date(now.getTime() - (24 * 60 * 60 * 1000)).toISOString();
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch new issues
            const newIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              since: last24h,
              state: 'all'
            });

            // Fetch recent commits
            const recentCommits = await github.rest.repos.listCommits({
              owner,
              repo,
              since: last24h
            });

            let report = `# Daily Repo Status Report (${now.toDateString()})\n\n`;
            
            report += `## New Activity (Last 24h)\n\n`;
            
            if (newIssues.data.length > 0) {
              report += `### Issues & PRs\n`;
              newIssues.data.forEach(item => {
                const type = item.pull_request ? 'PR' : 'Issue';
                report += `- [${type}] [${item.title}](${item.html_url}) (#${item.number}) - ${item.state}\n`;
              });
            } else {
              report += `No new issues or PRs.\n`;
            }

            if (recentCommits.data.length > 0) {
              report += `\n### Recent Commits\n`;
              recentCommits.data.slice(0, 10).forEach(commit => {
                report += `- [${commit.sha.substring(0, 7)}](${commit.html_url}) - ${commit.commit.message.split('\n')[0]}\n`;
              });
              if (recentCommits.data.length > 10) report += `- ... and ${recentCommits.data.length - 10} more\n`;
            } else {
              report += `\nNo new commits.\n`;
            }

            report += `\n## Project Status & Recommendations\n`;
            report += `- Maintainers should review any open PRs from the last 24h.\n`;
            report += `- Check CI status for recent commits.\n`;
            
            report += `\n## Actionable Next Steps\n`;
            report += `1. Review recent activity above.\n`;
            report += `2. Address high-priority issues.\n`;

            core.setOutput('report', report);

      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.report-gen.outputs.report }}`;
            const now = new Date();
            const title = `[repo status] Daily Report - ${now.toDateString()}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: report,
              labels: ['report']
            });
