name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint || echo "Lint not yet configured, skipping"

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Create dummy config for integration tests
        run: |
          mkdir -p /tmp/oh-my-mcp-integration
          cat > /tmp/oh-my-mcp-integration/config.yaml << 'EOF'
          managementPort: 28080
          gatewayPort: 28090
          logLevel: info
          servers:
            dummy:
              command: ["echo", "dummy"]
              enabled: false
          EOF

      # Optional: upload coverage to Codecov
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
