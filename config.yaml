managementPort: 8080
gatewayPort: 8090
logLevel: debug

auth:
  tokens:
    - "test-token"

servers:
  memory:
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-memory"
    timeout: 120000
    enabled: true
  
  filesystem:
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/tmp"
    timeout: 120000
    enabled: true
  
  sqlite:
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-sqlite"
      - "/tmp/test.db"
    timeout: 120000
    enabled: true
  
  web-search:
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-web-search"
    timeout: 120000
    enabled: true
